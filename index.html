<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안산벙벙벙 정산</title>
    <!-- 따뜻하고 부드러운 고딕체(나눔고딕) 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfbf7; /* 따뜻한 아이보리 톤 배경 */
            --primary-color: #ff8a3d; /* 당근마켓 느낌의 따뜻한 주황색 */
            --text-color: #4a4a4a;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Nanum Gothic', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px; /* 모바일 화면 너비 최적화 */
        }

        /* 상단 타이틀 & 만든이 영역 스타일 */
        .header-area {
            text-align: center;
            margin: 15px 0 25px 0;
        }

        h1 {
            font-size: 24px;
            color: var(--primary-color);
            font-weight: 700;
        }

        .made-by {
            font-size: 12px;
            color: #888;
            margin-top: -3px; /* 타이틀과 조금 더 가깝게 붙임 */
        }

        /* 섹션(카드) 스타일 */
        .section-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(232, 223, 202, 0.4);
            border: 1px solid #f1ece1;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 2px solid #fdf5e6;
            color: #333;
        }

        /* 입력창 영역 스타일 */
        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #666;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd8cd;
            border-radius: 8px;
            font-size: 16px;
            background-color: #faf9f6;
            transition: all 0.2s;
            -webkit-appearance: none; /* 모바일 브라우저 기본 스타일 방지 */
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 4px rgba(255, 138, 61, 0.2);
        }

        /* 버튼 스타일 */
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            box-shadow: 0 4px 6px rgba(255, 138, 61, 0.2);
            transition: background 0.1s;
        }

        button:active {
            background-color: #e0732c;
        }

        /* 결과 박스 스타일 */
        .result-box {
            margin-top: 18px;
            padding: 15px;
            background-color: #fff9f3;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
            display: none; /* 계산 전에는 비표시 */
        }

        .result-line {
            font-size: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-line:last-of-type {
            margin-bottom: 0;
        }

        .highlight {
            font-weight: bold;
            color: #d9534f;
            font-size: 18px;
        }
        
        .surplus {
            font-size: 13px;
            color: #888;
            margin-top: 10px;
            text-align: right;
            border-top: 1px dashed #eddcc9;
            padding-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 상단 영역: 타이틀 & 만든이 -->
    <div class="header-area">
        <h1>안산벙벙벙 정산 🥕</h1>
        <p class="made-by">made by 민초</p>
    </div>

    <!-- 섹션 1: 안방규칙대로 -->
    <div class="section-card">
        <h2>1. 안방규칙대로 정산</h2>
        <div class="input-group">
            <label>결제 금액 (원)</label>
            <input type="number" id="ab-amount" inputmode="numeric" placeholder="예: 420000">
        </div>
        <div class="input-group">
            <label>남자 인원수 (명)</label>
            <input type="number" id="ab-men" inputmode="numeric" placeholder="예: 8">
        </div>
        <div class="input-group">
            <label>여자 인원수 (명)</label>
            <input type="number" id="ab-women" inputmode="numeric" placeholder="예: 5">
        </div>
        <div class="input-group">
            <label>회비 (원)</label>
            <input type="number" id="ab-fee" inputmode="numeric" value="1000">
        </div>
        <button onclick="calcAnbang()">정산하기</button>

        <div class="result-box" id="ab-result">
            <div class="result-line"><span>남자 최종 정산금액:</span> <span id="res-man" class="highlight">0원</span></div>
            <div class="result-line"><span>여자 최종 정산금액:</span> <span id="res-woman" class="highlight">0원</span></div>
            <div class="surplus" id="ab-surplus">정산 후 남는 금액(잉여): 0원</div>
        </div>
    </div>

    <!-- 섹션 2: 1/n 정산 -->
    <div class="section-card">
        <h2>2. 1/n 일반 정산</h2>
        <div class="input-group">
            <label>결제 금액 (원)</label>
            <input type="number" id="n-amount" inputmode="numeric" placeholder="예: 150000">
        </div>
        <div class="input-group">
            <label>벙 참여 인원수 (명)</label>
            <input type="number" id="n-people" inputmode="numeric" placeholder="예: 4">
        </div>
        <button onclick="calcN分()">정산하기</button>

        <div class="result-box" id="n-result">
            <div class="result-line"><span>1인당 정산 금액:</span> <span id="res-n" class="highlight">0원</span></div>
            <div class="surplus" id="n-surplus">정산 후 남는 금액(잉여): 0원</div>
        </div>
    </div>
</div>

<script>
    // 100원 단위 올림 함수 (1원이라도 있으면 올림)
    function ceil100(val) {
        return Math.ceil(val / 100) * 100;
    }

    // 안방규칙 계산 로직
    function calcAnbang() {
        const amount = Number(document.getElementById('ab-amount').value);
        const men = Number(document.getElementById('ab-men').value);
        const women = Number(document.getElementById('ab-women').value);
        const fee = Number(document.getElementById('ab-fee').value);

        if(!amount || (men === 0 && women === 0)) {
            alert('결제 금액과 인원수를 입력해주세요.');
            return;
        }

        // 여자는 남자의 절반 가중치(0.5)를 가짐
        // 공식: 남자가 내야 할 원금 = 결제금액 / (남자수 + 0.5 * 여자수)
        const baseWeight = men + (0.5 * women);
        const manBase = amount / baseWeight;
        const womanBase = manBase * 0.5;

        // 원금에 대해 100원 단위 올림을 각각 먼저 적용
        const ceiledMan = ceil100(manBase);
        const ceiledWoman = ceil100(womanBase);

        // 올림된 원금에 회비를 더해 최종 청구 금액 산출
        const finalMan = ceiledMan + fee;
        const finalWoman = ceiledWoman + fee;

        // 올림으로 인해 정산 후 남는 잉여 금액 계산 (회비 제외 순수 원금 기준 비교)
        const totalCollectedRaw = (ceiledMan * men) + (ceiledWoman * women);
        const surplus = totalCollectedRaw - amount;

        // 화면에 결과 반영
        document.getElementById('res-man').innerText = finalMan.toLocaleString() + '원';
        document.getElementById('res-woman').innerText = finalWoman.toLocaleString() + '원';
        document.getElementById('ab-surplus').innerText = '정산 후 남는 금액(잉여): ' + surplus.toLocaleString() + '원';
        document.getElementById('ab-result').style.display = 'block';
    }

    // 1/n 계산 로직
    function calcN分() {
        const amount = Number(document.getElementById('n-amount').value);
        const people = Number(document.getElementById('n-people').value);

        if(!amount || !people) {
            alert('결제 금액과 인원수를 입력해주세요.');
            return;
        }

        const base = amount / people;
        const finalN = ceil100(base);
        const surplus = (finalN * people) - amount;

        document.getElementById('res-n').innerText = finalN.toLocaleString() + '원';
        document.getElementById('n-surplus').innerText = '정산 후 남는 금액(잉여): ' + surplus.toLocaleString() + '원';
        document.getElementById('n-result').style.display = 'block';
    }
</script>
</body>
</html>
